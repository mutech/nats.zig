name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0
  NATS_CLI_VERSION: v0.3.1
  # No nats-server releases exist for the UDS fork yet, so CI builds it
  # from source. Point these at the fork repo/ref to test against it.
  # The repo must be publicly cloneable (or add credentials to the step).
  NATS_SERVER_FORK_REPO: https://github.com/mutech/nats-server.git
  NATS_SERVER_FORK_REF: main

jobs:
  build:
    name: Build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Show Zig version
        run: zig version

      - name: Check formatting
        run: zig build fmt-check

      - name: Build examples and package
        run: zig build

      - name: Run unit tests
        run: zig build test

  integration:
    name: Integration tests (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: Debug
            args: ""
          - mode: ReleaseFast
            args: -Doptimize=ReleaseFast

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: integration-${{ matrix.mode }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build nats-server (UDS fork)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/bin"
          git clone --depth 1 --branch "${NATS_SERVER_FORK_REF}" \
            "${NATS_SERVER_FORK_REPO}" "$RUNNER_TEMP/nats-server-fork"
          go -C "$RUNNER_TEMP/nats-server-fork" build \
            -o "$HOME/.local/bin/nats-server" .

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install NATS CLI
        shell: bash
        run: |
          set -euo pipefail

          nats_cli_version="${NATS_CLI_VERSION#v}"
          nats_cli_archive="nats-${nats_cli_version}-linux-amd64.zip"
          nats_cli_url="https://github.com/nats-io/natscli/releases/download/${NATS_CLI_VERSION}/${nats_cli_archive}"

          mkdir -p "$HOME/.local/bin" "$RUNNER_TEMP/nats-cli"

          curl --fail --location --show-error --silent "$nats_cli_url" --output "$RUNNER_TEMP/$nats_cli_archive"
          unzip -q "$RUNNER_TEMP/$nats_cli_archive" -d "$RUNNER_TEMP/nats-cli"
          nats_cli_bin="$(find "$RUNNER_TEMP/nats-cli" -type f -name nats -print -quit)"
          test -n "$nats_cli_bin"
          install -m 0755 "$nats_cli_bin" "$HOME/.local/bin/nats"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          zig version
          nats-server --version
          nats --version

      - name: Run integration tests
        run: |
          set -euo pipefail
          zig build test-integration ${{ matrix.args }}
          zig build test-integration-micro ${{ matrix.args }}
          zig build test-integration-tls ${{ matrix.args }}
          zig build test-integration-uds ${{ matrix.args }}
